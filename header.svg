<svg width="840" height="200" viewBox="0 0 840 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="rgba(139,148,158,0.1)"/>
    </pattern>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#141a26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <style>
    .f1 { animation: fadeIn 0.5s ease-out forwards 0.3s; opacity: 0; }
    .f2 { animation: fadeIn 0.5s ease-out forwards 0.8s; opacity: 0; }
    .f3 { animation: fadeIn 0.5s ease-out forwards 1.4s; opacity: 0; }
    .f4 { animation: fadeIn 0.5s ease-out forwards 1.9s; opacity: 0; }
    .f5 { animation: fadeIn 0.5s ease-out forwards 2.4s; opacity: 0; }
    .cur { animation: blink 1.1s step-end infinite 2.8s; opacity: 0; }
    .bar { animation: slideIn 0.8s ease-out forwards 2.6s; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes slideIn { from { opacity: 0; } to { opacity: 0.6; } }
    .p { fill: #7ee787; }
    .c { fill: #c9d1d9; }
    .o { fill: #e6edf3; }
    .h { fill: #79c0ff; }
    .d { fill: #6e7681; }
    .m { font-family: ui-monospace,'Cascadia Code','SF Mono',Menlo,Consolas,monospace; font-size: 14px; }
    .ms { font-family: ui-monospace,'Cascadia Code','SF Mono',Menlo,Consolas,monospace; font-size: 12px; }
    .mt { font-family: ui-monospace,'Cascadia Code','SF Mono',Menlo,Consolas,monospace; font-size: 11px; }
  </style>

  <!-- Window -->
  <rect width="840" height="200" rx="10" fill="#0d1117"/>
  <rect width="840" height="200" rx="10" fill="url(#dots)"/>

  <!-- Title bar -->
  <rect width="840" height="36" rx="10" fill="url(#titlebar)"/>
  <rect y="26" width="840" height="10" fill="#141a26"/>
  <line x1="0" y1="36" x2="840" y2="36" stroke="rgba(139,148,158,0.1)" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="5.5" fill="#ff5f57" opacity="0.9"/>
  <circle cx="40" cy="18" r="5.5" fill="#febc2e" opacity="0.9"/>
  <circle cx="58" cy="18" r="5.5" fill="#28c840" opacity="0.9"/>

  <!-- Tab indicator -->
  <rect x="340" y="28" width="160" height="8" rx="0" fill="#0d1117"/>
  <text x="420" y="22" text-anchor="middle" class="ms" fill="#8b949e">eddie@build ~/oss</text>

  <!-- Line 1: whoami -->
  <g class="f1">
    <text x="28" y="66" class="m p" font-weight="600">$</text>
    <text x="46" y="66" class="m c">whoami</text>
  </g>

  <!-- Line 2: output -->
  <g class="f2">
    <text x="28" y="90" class="m">
      <tspan class="d">&#x2192;</tspan>
      <tspan class="o" dx="6">staff engineer</tspan>
      <tspan class="d"> // </tspan>
      <tspan class="o">ex-tiktok</tspan>
      <tspan class="d"> // </tspan>
      <tspan class="o">open-source ai agent infrastructure</tspan>
    </text>
  </g>

  <!-- Line 3: ls -->
  <g class="f3">
    <text x="28" y="124" class="m p" font-weight="600">$</text>
    <text x="46" y="124" class="m c">ls flagship/</text>
  </g>

  <!-- Line 4: projects -->
  <g class="f4">
    <text x="28" y="150" class="m">
      <tspan class="h" font-weight="600">skillpm</tspan>
      <tspan class="d" dx="8">&#x2502;</tspan>
      <tspan class="h" dx="8" font-weight="600">lindy-orchestrator</tspan>
      <tspan class="d" dx="8">&#x2502;</tspan>
      <tspan class="h" dx="8" font-weight="600">symphony-claude</tspan>
    </text>
  </g>

  <!-- Subtle tag line -->
  <g class="f5">
    <text x="28" y="176" class="mt d" font-style="italic">5+ projects shipped this year  &#x00B7;  all built with ai as a force multiplier</text>
  </g>

  <!-- Activity bar decoration -->
  <g class="bar">
    <rect x="700" y="56" width="3" height="8" rx="1" fill="#7ee787"/>
    <rect x="706" y="52" width="3" height="12" rx="1" fill="#7ee787"/>
    <rect x="712" y="48" width="3" height="16" rx="1" fill="#79c0ff"/>
    <rect x="718" y="54" width="3" height="10" rx="1" fill="#7ee787"/>
    <rect x="724" y="50" width="3" height="14" rx="1" fill="#79c0ff"/>
    <rect x="730" y="46" width="3" height="18" rx="1" fill="#7ee787"/>
    <rect x="736" y="52" width="3" height="12" rx="1" fill="#79c0ff"/>
    <rect x="742" y="44" width="3" height="20" rx="1" fill="#7ee787"/>
    <rect x="748" y="50" width="3" height="14" rx="1" fill="#79c0ff"/>
    <rect x="754" y="42" width="3" height="22" rx="1" fill="#7ee787"/>
    <rect x="760" y="48" width="3" height="16" rx="1" fill="#7ee787"/>
    <rect x="766" y="40" width="3" height="24" rx="1" fill="#79c0ff"/>
    <rect x="772" y="46" width="3" height="18" rx="1" fill="#7ee787"/>
    <rect x="778" y="38" width="3" height="26" rx="1" fill="#79c0ff"/>
    <rect x="784" y="42" width="3" height="22" rx="1" fill="#7ee787"/>
    <rect x="790" y="36" width="3" height="28" rx="1" fill="#79c0ff"/>
    <rect x="796" y="40" width="3" height="24" rx="1" fill="#7ee787"/>
    <rect x="802" y="36" width="3" height="28" rx="1" fill="#7ee787"/>
  </g>

  <!-- Blinking cursor -->
  <rect class="cur" x="28" y="182" width="7" height="13" rx="1" fill="#7ee787"/>
</svg>
